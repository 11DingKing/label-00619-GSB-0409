<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProjectFileManager - 项目文件管理器</title>
    <!-- CSS_PLACEHOLDER -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="app" class="app-container">
        <!-- 左侧面板：目录树 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2 class="sidebar-title">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                    </svg>
                    <span id="currentFolderName">目录树</span>
                </h2>
            </div>
            <div class="directory-tree" id="directoryTree">
                <!-- 目录树节点动态渲染 -->
                <div class="tree-loading">
                    <div class="loading-spinner"></div>
                    <span>加载中...</span>
                </div>
            </div>
            <!-- 快捷位置 -->
            <div class="quick-access">
                <div class="quick-access-title">快捷位置</div>
                <div class="quick-access-item" data-path="favorites" id="favoritesEntry" onclick="if(window.showFavorites){window.showFavorites();} return false;">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                    </svg>
                    <span>收藏</span>
                </div>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 文件区 -->
            <div class="file-area" id="fileArea">
                <!-- 路径面包屑 -->
                <div class="breadcrumb-bar" id="breadcrumbBar">
                    <div class="breadcrumb">
                        <span class="breadcrumb-item" data-path="/">根目录</span>
                    </div>
                </div>

                <!-- 文件网格 -->
                <div class="file-grid" id="fileGrid">
                    <!-- 空状态 -->
                    <div class="empty-state" id="emptyState" style="display: none;">
                        <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                            <line x1="12" y1="11" x2="12" y2="17"/>
                            <line x1="9" y1="14" x2="15" y2="14"/>
                        </svg>
                        <p>文件夹为空</p>
                    </div>

                    <!-- 加载状态 -->
                    <div class="loading-state" id="loadingState">
                        <div class="loading-spinner large"></div>
                        <p>加载文件中...</p>
                    </div>

                    <!-- 文件项容器 -->
                    <div class="file-items" id="fileItems">
                        <!-- 文件项动态渲染 -->
                    </div>

                    <!-- 懒加载触发器 -->
                    <div class="load-more-trigger" id="loadMoreTrigger"></div>
                </div>
            </div>

            <!-- 底部工具栏 -->
            <footer class="toolbar" id="toolbar">
                <div class="toolbar-left">
                    <!-- 刷新按钮 -->
                    <button class="toolbar-btn" id="btnRefresh" title="刷新 (F5)">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="23 4 23 10 17 10"/>
                            <polyline points="1 20 1 14 7 14"/>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                        </svg>
                    </button>

                    <!-- 保存按钮 -->
                    <button class="toolbar-btn" id="btnSave" title="保存配置 (Ctrl+S)">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                            <polyline points="17 21 17 13 7 13 7 21"/>
                            <polyline points="7 3 7 8 15 8"/>
                        </svg>
                    </button>

                    <!-- 搜索框 -->
                    <div class="search-box">
                        <svg class="icon search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"/>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                        <input type="text" id="searchInput" class="search-input" placeholder="搜索文件..." autocomplete="off">
                        <button class="search-clear" id="searchClear" style="display: none;">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="18" y1="6" x2="6" y2="18"/>
                                <line x1="6" y1="6" x2="18" y2="18"/>
                            </svg>
                        </button>
                        <button type="button" class="toolbar-btn search-go-btn" id="searchGoBtn" title="按当前文件夹筛选" onclick="var i=document.getElementById('searchInput');if(window.searchFiles&&i){window.searchFiles(i.value);}return false;">筛选</button>
                    </div>
                </div>

                <div class="toolbar-center">
                    <!-- 文件统计 -->
                    <span class="file-stats" id="fileStats">0 个项目</span>
                </div>

                <div class="toolbar-right">
                    <!-- 显示隐藏文件 -->
                    <button class="toolbar-btn" id="btnHidden" title="显示隐藏文件">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>

                    <!-- 每行数量滑块 -->
                    <div class="slider-container">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="7" height="7"/>
                            <rect x="14" y="3" width="7" height="7"/>
                            <rect x="14" y="14" width="7" height="7"/>
                            <rect x="3" y="14" width="7" height="7"/>
                        </svg>
                        <input type="range" id="itemsPerRowSlider" class="slider" min="2" max="8" value="4">
                        <span class="slider-value" id="sliderValue">4</span>
                    </div>

                    <!-- 排序按钮 -->
                    <button class="toolbar-btn" id="btnSort" title="排序方式">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="4" y1="6" x2="20" y2="6"/>
                            <line x1="4" y1="12" x2="16" y2="12"/>
                            <line x1="4" y1="18" x2="12" y2="18"/>
                        </svg>
                    </button>
                </div>
            </footer>
        </main>

        <!-- 上下文菜单 -->
        <div class="context-menu" id="contextMenu" style="display: none;">
            <div class="context-menu-item" data-action="open">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                    <polyline points="15 3 21 3 21 9"/>
                    <line x1="10" y1="14" x2="21" y2="3"/>
                </svg>
                打开
            </div>
            <div class="context-menu-item" data-action="reveal">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                </svg>
                在文件夹中显示
            </div>
            <div class="context-menu-divider"></div>
            <div class="context-menu-item" data-action="copyPath">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                </svg>
                复制路径
            </div>
            <div class="context-menu-item" data-action="favorite">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                </svg>
                <span class="favorite-text">收藏</span>
            </div>
        </div>

        <!-- 排序菜单 -->
        <div class="sort-menu" id="sortMenu" style="display: none;">
            <div class="sort-menu-item" data-sort="name">
                <span>名称</span>
                <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="20 6 9 17 4 12"/>
                </svg>
            </div>
            <div class="sort-menu-item" data-sort="date">
                <span>修改日期</span>
                <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="20 6 9 17 4 12"/>
                </svg>
            </div>
            <div class="sort-menu-item" data-sort="size">
                <span>大小</span>
                <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="20 6 9 17 4 12"/>
                </svg>
            </div>
            <div class="sort-menu-item" data-sort="type">
                <span>类型</span>
                <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="20 6 9 17 4 12"/>
                </svg>
            </div>
            <div class="sort-menu-divider"></div>
            <div class="sort-menu-item" data-order="asc">
                <span>升序</span>
                <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="20 6 9 17 4 12"/>
                </svg>
            </div>
            <div class="sort-menu-item" data-order="desc">
                <span>降序</span>
                <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="20 6 9 17 4 12"/>
                </svg>
            </div>
        </div>

        <!-- Toast 消息 -->
        <div class="toast-container" id="toastContainer"></div>
    </div>

    <!-- JS_PLACEHOLDER -->
    <script src="js/app.js"></script>
</body>
</html>
